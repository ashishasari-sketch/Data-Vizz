<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Road Rash Classic</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #111;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            border: 4px solid #444;
            box-shadow: 0 0 20px rgba(0, 255, 200, 0.2);
            background: #000;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 8px;
            border: 2px solid #555;
            pointer-events: none;
        }
        .bar-container {
            width: 150px;
            height: 16px;
            background: #333;
            border: 1px solid #777;
            display: inline-block;
            vertical-align: middle;
            margin-left: 5px;
        }
        .bar {
            height: 100%;
            width: 100%;
            background: #0f0;
            transition: width 0.1s;
        }
        #game-over {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            z-index: 10;
        }
        #game-over button {
            margin-top: 20px;
            padding: 10px 25px;
            font-size: 1.2rem;
            font-weight: bold;
            background: #e10600;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #game-over button:hover {
            background: #ff2a2a;
        }
        .controls-hint {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            padding: 5px 15px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="canvas" width="800" height="600"></canvas>
        
        <!-- HEADS UP DISPLAY -->
        <div id="hud">
            <div>SPEED: <span id="speed-val">0</span> MPH</div>
            <div>DISTANCE: <span id="dist-val">0</span>m</div>
            <div>
                HEALTH: 
                <div class="bar-container">
                    <div id="health-bar" class="bar"></div>
                </div>
            </div>
        </div>

        <div class="controls-hint">
            [<b>W/Up</b>] Accelerate | [<b>A/D/Arrows</b>] Steer | [<b>Space</b>] Punch/Attack
        </div>

        <!-- GAME OVER SCREEN -->
        <div id="game-over" style="display: none;">
            <h1 id="go-title">WACKED OUT!</h1>
            <p id="go-msg" style="font-size: 1.2rem; margin-top: 10px; color: #aaa;"></p>
            <button onclick="resetGame()">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // --- CONSTANTS & CONFIG ---
        const CANVAS_W = 800;
        const CANVAS_H = 600;
        const ROAD_WIDTH = 2000;
        const SEGMENT_LENGTH = 200;
        const RUMBLE_LENGTH = 3;
        const CAMERA_HEIGHT = 1000;
        const CAMERA_DEPTH = 1 / Math.tan((100 / 2) * Math.PI / 180); // FOV 100
        const DRAW_DISTANCE = 300;

        // --- INPUT STATE ---
        const keys = { up: false, down: false, left: false, right: false, attack: false };

        window.addEventListener('keydown', e => handleKey(e, true));
        window.addEventListener('keyup', e => handleKey(e, false));

        function handleKey(e, isDown) {
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') keys.up = isDown;
            if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') keys.down = isDown;
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = isDown;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = isDown;
            if (e.key === ' ' || e.key === 'Control') keys.attack = isDown;
        }

        // --- ROAD SEGMENTS SETUP ---
        let segments = [];
        let totalTrackLength = 0;

        function buildRoad() {
            segments = [];
            // Build 1500 segments with curves
            for (let i = 0; i < 1500; i++) {
                let curve = 0;
                // Add winding turns
                if (i > 100 && i < 300) curve = 2;
                if (i > 400 && i < 600) curve = -3;
                if (i > 700 && i < 900) curve = 4;
                if (i > 1000 && i < 1200) curve = -2;

                segments.push({
                    index: i,
                    p1: { world: { z: i * SEGMENT_LENGTH }, camera: {}, screen: {} },
                    p2: { world: { z: (i + 1) * SEGMENT_LENGTH }, camera: {}, screen: {} },
                    curve: curve,
                    color: Math.floor(i / RUMBLE_LENGTH) % 2 === 0 ? 
                        { grass: '#107c10', road: '#444444', rumble: '#ffffff', lane: '#ffffff' } :
                        { grass: '#0e690e', road: '#3b3b3b', rumble: '#e10600', lane: '#3b3b3b' }
                });
            }
            totalTrackLength = segments.length * SEGMENT_LENGTH;
        }

        // --- GAME VARIABLES ---
        let playerX = 0;            // Normalized -1 (left) to 1 (right)
        let playerZ = 0;            // Distance along track
        let playerSpeed = 0;        // Current speed
        const maxSpeed = 12000;     // Top speed
        const accel = 4000;
        const decel = 8000;
        let playerHealth = 100;
        let attackCooldown = 0;
        let attackAnimation = 0;
        let isGameOver = false;

        // Opponents Array
        let rivals = [];

        function initRivals() {
            rivals = [
                { x: -0.4, z: 2000, speed: 7000, color: '#00D2FF', name: 'Viper', health: 50, state: 'normal' },
                { x: 0.4, z: 5000, speed: 8500, color: '#FFD700', name: 'Razor', health: 60, state: 'normal' },
                { x: -0.2, z: 9000, speed: 9500, color: '#FF0055', name: 'Biff', health: 80, state: 'normal' },
                { x: 0.3, z: 14000, speed: 10500, color: '#9D00FF', name: 'Duke', health: 100, state: 'normal' }
            ];
        }

        // --- MATH PROJECTION HELPER ---
        function project(p, cameraX, cameraY, cameraZ) {
            p.camera.x = (p.world.x || 0) - cameraX;
            p.camera.y = (p.world.y || 0) - cameraY;
            p.camera.z = p.world.z - cameraZ;

            const scale = CAMERA_DEPTH / Math.max(1, p.camera.z);
            p.screen.x = Math.round((CANVAS_W / 2) + (scale * p.camera.x * CANVAS_W / 2));
            p.screen.y = Math.round((CANVAS_H / 2) - (scale * p.camera.y * CANVAS_H / 2));
            p.screen.w = Math.round(scale * ROAD_WIDTH * CANVAS_W / 2);
        }

        // --- RENDER ROAD POLYGON ---
        function renderSegment(ctx, width, lanes, x1, y1, w1, x2, y2, w2, color) {
            // Grass background
            ctx.fillStyle = color.grass;
            ctx.fillRect(0, y2, width, y1 - y2);

            // Road surface
            ctx.fillStyle = color.road;
            ctx.beginPath();
            ctx.moveTo(x1 - w1, y1);
            ctx.lineTo(x2 - w2, y2);
            ctx.lineTo(x2 + w2, y2);
            ctx.lineTo(x1 + w1, y1);
            ctx.fill();

            // Rumble strips
            const r1 = w1 / 10;
            const r2 = w2 / 10;
            ctx.fillStyle = color.rumble;
            // Left Rumble
            ctx.beginPath();
            ctx.moveTo(x1 - w1 - r1, y1); ctx.lineTo(x2 - w2 - r2, y2);
            ctx.lineTo(x2 - w2, y2);      ctx.lineTo(x1 - w1, y1);
            ctx.fill();
            // Right Rumble
            ctx.beginPath();
            ctx.moveTo(x1 + w1 + r1, y1); ctx.lineTo(x2 + w2 + r2, y2);
            ctx.lineTo(x2 + w2, y2);      ctx.lineTo(x1 + w1, y1);
            ctx.fill();

            // Lane Dividers
            if (color.lane) {
                const lineW1 = w1 / 20;
                const lineW2 = w2 / 20;
                ctx.fillStyle = color.lane;
                ctx.beginPath();
                ctx.moveTo(x1 - lineW1, y1); ctx.lineTo(x2 - lineW2, y2);
                ctx.lineTo(x2 + lineW2, y2); ctx.lineTo(x1 + lineW1, y1);
                ctx.fill();
            }
        }

        // --- MAIN GAME LOOP ---
        let lastTime = performance.now();

        function gameLoop(now) {
            const dt = Math.min(1, (now - lastTime) / 1000);
            lastTime = now;

            if (!isGameOver) {
                update(dt);
                render();
            }

            requestAnimationFrame(gameLoop);
        }

        // --- UPDATE GAME STATE ---
        function update(dt) {
            // Handle Acceleration
            if (keys.up) {
                playerSpeed += accel * dt;
            } else if (keys.down) {
                playerSpeed -= decel * dt;
            } else {
                playerSpeed -= (accel / 2) * dt; // Natural friction
            }

            playerSpeed = Math.max(0, Math.min(playerSpeed, maxSpeed));

            // Move player along track
            playerZ += playerSpeed * dt;
            if (playerZ >= totalTrackLength) playerZ -= totalTrackLength; // Loop circuit

            // Steering & Curvature Effects
            const currentSegment = segments[Math.floor(playerZ / SEGMENT_LENGTH) % segments.length];
            const speedRatio = playerSpeed / maxSpeed;

            if (keys.left) playerX -= 1.5 * dt * (0.3 + speedRatio);
            if (keys.right) playerX += 1.5 * dt * (0.3 + speedRatio);

            // Apply road curvature pull to player
            playerX -= (currentSegment.curve * 0.4 * speedRatio * dt);

            // Off-road penalty
            if ((playerX < -1.1 || playerX > 1.1) && playerSpeed > 2000) {
                playerSpeed -= decel * 0.5 * dt; // Slow down on grass
            }

            // Keep within bounds
            playerX = Math.max(-2, Math.min(2, playerX));

            // Attack Handling
            if (attackCooldown > 0) attackCooldown -= dt;
            if (attackAnimation > 0) attackAnimation -= dt * 4;

            if (keys.attack && attackCooldown <= 0) {
                attackCooldown = 0.5;
                attackAnimation = 1; // Trigger arm swing animation
                checkMeleeCombat();
            }

            // Update Rivals Movement
            rivals.forEach(rival => {
                rival.z += rival.speed * dt;
                if (rival.z >= totalTrackLength) rival.z -= totalTrackLength;

                // Simple AI wander
                if (Math.random() < 0.02) rival.x += (Math.random() - 0.5) * 0.2;
                rival.x = Math.max(-0.8, Math.min(0.8, rival.x));

                // Rival Attack Player if too close
                const dz = Math.abs(rival.z - playerZ);
                const dx = Math.abs(rival.x - playerX);
                if (dz < 150 && dx < 0.25 && rival.state === 'normal') {
                    if (Math.random() < 0.03) {
                        playerHealth -= 8;
                        createSpark(rival.x, rival.z);
                        if (playerHealth <= 0) triggerGameOver(false, "Knocked out by " + rival.name + "!");
                    }
                }
            });

            // Update HUD
            document.getElementById('speed-val').innerText = Math.floor(playerSpeed / 100);
            document.getElementById('dist-val').innerText = Math.floor(playerZ / 10);
            const healthBar = document.getElementById('health-bar');
            healthBar.style.width = Math.max(0, playerHealth) + '%';
            if (playerHealth < 30) healthBar.style.background = '#f00';
            else healthBar.style.background = '#0f0';
        }

        // --- COMBAT SYSTEM ---
        function checkMeleeCombat() {
            rivals.forEach(rival => {
                const dz = Math.abs(rival.z - playerZ);
                const dx = rival.x - playerX;

                // Check proximity for hit
                if (dz < 200 && Math.abs(dx) < 0.35) {
                    rival.health -= 35;
                    rival.x += (dx > 0 ? 0.3 : -0.3); // Knockback side
                    rival.speed *= 0.7;               // Slow them down

                    if (rival.health <= 0) {
                        rival.state = 'wrecked';
                        rival.speed = 0;
                    }
                }
            });
        }

        // --- RENDERING ROUTINES ---
        function render() {
            ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

            // Draw Sky & Horizon Background
            ctx.fillStyle = '#1a0033';
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H / 2);
            ctx.fillStyle = '#ff5500';
            ctx.fillRect(0, CANVAS_H / 2 - 40, CANVAS_W, 40); // Sunset band

            const baseSegment = segments[Math.floor(playerZ / SEGMENT_LENGTH) % segments.length];
            let cameraX = playerX * ROAD_WIDTH;
            let cameraY = CAMERA_HEIGHT;
            let cameraZ = playerZ;

            let dx = 0;
            let x = 0;

            // Draw 3D Pseudo Road from back to front
            for (let n = 0; n < DRAW_DISTANCE; n++) {
                const segment = segments[(baseSegment.index + n) % segments.length];
                
                // Handle track loop wrapper calculation
                const segmentLoopedZ = segment.p1.world.z + (segment.index < baseSegment.index ? totalTrackLength : 0);

                project(segment.p1, cameraX - x, cameraY, cameraZ);
                project(segment.p2, cameraX - x - dx, cameraY, cameraZ);

                x += dx;
                dx += segment.curve;

                // Ignore segments behind camera
                if (segment.p1.camera.z <= CAMERA_DEPTH) continue;

                // Draw Segment Road
                if (segment.p2.screen.y < segment.p1.screen.y) {
                    renderSegment(
                        ctx, CANVAS_W, 2,
                        segment.p1.screen.x, segment.p1.screen.y, segment.p1.screen.w,
                        segment.p2.screen.x, segment.p2.screen.y, segment.p2.screen.w,
                        segment.color
                    );
                }
            }

            // Draw Opponents
            renderRivals(baseSegment.index, cameraX, cameraY, cameraZ);

            // Draw Player Bike
            renderPlayer();
        }

        function renderRivals(baseIndex, cameraX, cameraY, cameraZ) {
            // Sort rivals by distance so furthest render first
            const sortedRivals = [...rivals].sort((a, b) => b.z - a.z);

            sortedRivals.forEach(rival => {
                let relativeZ = rival.z - cameraZ;
                if (relativeZ < 0) relativeZ += totalTrackLength;

                if (relativeZ > 0 && relativeZ < DRAW_DISTANCE * SEGMENT_LENGTH) {
                    const scale = CAMERA_DEPTH / relativeZ;
                    const spriteX = (CANVAS_W / 2) + (scale * (rival.x * ROAD_WIDTH - cameraX) * CANVAS_W / 2);
                    const spriteY = (CANVAS_H / 2) - (scale * -CAMERA_HEIGHT * CANVAS_H / 2);
                    const spriteSize = Math.max(10, scale * 120000);

                    if (spriteX > -100 && spriteX < CANVAS_W + 100) {
                        drawBikeSprite(ctx, spriteX, spriteY, spriteSize, rival.color, rival.state === 'wrecked', rival.name);
                    }
                }
            });
        }

        function renderPlayer() {
            const playerScreenX = CANVAS_W / 2;
            const playerScreenY = CANVAS_H - 40;
            const size = 130;

            ctx.save();
            ctx.translate(playerScreenX, playerScreenY);

            // Lean bike into steering
            let lean = 0;
            if (keys.left) lean = -0.15;
            if (keys.right) lean = 0.15;
            ctx.rotate(lean);

            // Bike Body Base
            ctx.fillStyle = '#111';
            ctx.fillRect(-size / 4, -size / 2, size / 2, size / 1.5); // Rear tire

            ctx.fillStyle = '#00E5FF'; // Player Bike Color
            ctx.beginPath();
            ctx.moveTo(-size / 3, 0);
            ctx.lineTo(size / 3, 0);
            ctx.lineTo(size / 4, -size / 2);
            ctx.lineTo(-size / 4, -size / 2);
            ctx.fill();

            // Rider Back/Jacket
            ctx.fillStyle = '#e10600';
            ctx.fillRect(-size / 3.5, -size / 1.2, size / 1.75, size / 2.5);

            // Helmet
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(0, -size / 1.1, size / 6, 0, Math.PI * 2);
            ctx.fill();

            // Visor
            ctx.fillStyle = '#000';
            ctx.fillRect(-size / 10, -size / 1.05, size / 5, size / 12);

            // Attack Punch/Kick Animation Arm
            if (attackAnimation > 0) {
                ctx.fillStyle = '#e10600';
                ctx.beginPath();
                ctx.arc(size / 2, -size / 1.2, 12, 0, Math.PI * 2); // Punch fist
                ctx.fill();

                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 6;
                ctx.beginPath();
                ctx.moveTo(size / 4, -size / 1.3);
                ctx.lineTo(size / 2, -size / 1.2);
                ctx.stroke();
            }

            ctx.restore();
        }

        function drawBikeSprite(ctx, x, y, size, color, isWrecked, name) {
            ctx.save();
            ctx.translate(x, y);

            if (isWrecked) {
                // Fallen bike graphics
                ctx.fillStyle = '#333';
                ctx.fillRect(-size / 2, -10, size, 15);
                ctx.fillStyle = '#888';
                ctx.fillText('💥 WRECK', -20, -20);
                ctx.restore();
                return;
            }

            // Nameplate above rival
            ctx.fillStyle = '#fff';
            ctx.font = '12px Courier';
            ctx.textAlign = 'center';
            ctx.fillText(name, 0, -size / 1.2);

            // Bike Rear Tire
            ctx.fillStyle = '#000';
            ctx.fillRect(-size / 6, -size / 2, size / 3, size / 2);

            // Bike Chassis
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(-size / 4, -size / 4);
            ctx.lineTo(size / 4, -size / 4);
            ctx.lineTo(size / 6, -size / 1.5);
            ctx.lineTo(-size / 6, -size / 1.5);
            ctx.fill();

            // Rider Head/Helmet
            ctx.fillStyle = '#222';
            ctx.beginPath();
            ctx.arc(0, -size / 1.2, size / 8, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        // --- GAME OVER LOGIC ---
        function triggerGameOver(win, message) {
            isGameOver = true;
            const goScreen = document.getElementById('game-over');
            const goTitle = document.getElementById('go-title');
            const goMsg = document.getElementById('go-msg');

            goTitle.innerText = win ? "RACE VICTORY!" : "WASTED!";
            goTitle.style.color = win ? "#00FF66" : "#FF0033";
            goMsg.innerText = message;
            goScreen.style.display = 'flex';
        }

        function resetGame() {
            playerX = 0;
            playerZ = 0;
            playerSpeed = 0;
            playerHealth = 100;
            isGameOver = false;
            document.getElementById('game-over').style.display = 'none';
            initRivals();
        }

        // --- START GAME ---
        buildRoad();
        initRivals();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
